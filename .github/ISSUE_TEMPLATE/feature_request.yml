name: Feature request
description: Propose a feature, adapter, or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Contributions are especially welcome around source compatibility, synthesis quality, evaluation, and UI clarity.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want to see
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and constraints
      description: Mention privacy, security, source-compatibility, or UX implications
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
